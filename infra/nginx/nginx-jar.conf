# Nginx configuration for reverse proxy and static file serving
# Location: /etc/nginx/sites-available/enroll
# Enable with: sudo ln -s /etc/nginx/sites-available/enroll /etc/nginx/sites-enabled/
# Then reload: sudo systemctl reload nginx

upstream api_gateway {
    server localhost:9087;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name api-enroll.encode.uz admin-enroll.encode.uz enroll.encode.uz;

    # Allow acme-challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# API Gateway (backend) - api-enroll.encode.uz
server {
    listen 443 ssl http2;
    server_name api-enroll.encode.uz;

    ssl_certificate /etc/letsencrypt/live/api-enroll.encode.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-enroll.encode.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    # Log files
    access_log /home/encode/enroll/logs/nginx_api_access.log;
    error_log /home/encode/enroll/logs/nginx_api_error.log;

    location / {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # WebSocket support
    location ~ /ws {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin Frontend - admin-enroll.encode.uz
server {
    listen 443 ssl http2;
    server_name admin-enroll.encode.uz;

    ssl_certificate /etc/letsencrypt/live/admin-enroll.encode.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin-enroll.encode.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /home/encode/enroll/admin;
    index index.html index.htm;

    # Log files
    access_log /home/encode/enroll/logs/nginx_admin_access.log;
    error_log /home/encode/enroll/logs/nginx_admin_error.log;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Reverse proxy to API gateway for /api calls
    location /api {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Web Frontend - enroll.encode.uz
server {
    listen 443 ssl http2;
    server_name enroll.encode.uz www.enroll.encode.uz;

    ssl_certificate /etc/letsencrypt/live/enroll.encode.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enroll.encode.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /home/encode/enroll/web;
    index index.html index.htm;

    # Log files
    access_log /home/encode/enroll/logs/nginx_web_access.log;
    error_log /home/encode/enroll/logs/nginx_web_error.log;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Reverse proxy to API gateway for /api calls
    location /api {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Certbot renewal helper (port 80)
server {
    listen 80;
    server_name api-enroll.encode.uz admin-enroll.encode.uz enroll.encode.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

