server {
    listen 80;

    server_name api-enroll.encode.uz www.api-enroll.encode.uz;

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept,Origin,User-Agent,Accept-Encoding,Accept-Language" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary Origin always;
        return 204;
    }

    location / {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept,Origin,User-Agent,Accept-Encoding,Accept-Language" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary Origin always;

        proxy_pass http://127.0.0.1:9003$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }
}
