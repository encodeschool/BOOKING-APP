services:
  service-registry:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: service-registry
    ports:
      - "9001:8761"
    volumes:
      - ./logs/service-registry:/app/logs
    restart: unless-stopped

  config-server:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    ports:
      - "9002:8888"
    depends_on:
      - service-registry
    volumes:
      - ./logs/config-server:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "9003:8080"
    depends_on:
      - service-registry
      - config-server
    volumes:
      - ./logs/api-gateway:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
    restart: unless-stopped

  auth-service:
