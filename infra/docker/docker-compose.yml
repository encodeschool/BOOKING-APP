  admin-frontend:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    ports:
      - "9009:80"
    restart: unless-stopped

  web-frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
