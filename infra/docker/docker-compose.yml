services:
  service-registry:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: service-registry
    ports:
      - "9001:8761"
    volumes:
      - ./logs/service-registry:/app/logs
    restart: unless-stopped

  config-server:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    ports:
      - "9002:8888"
    depends_on:
      - service-registry
    volumes:
      - ./logs/config-server:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
      - POSTGRES_HOST=postgres
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "9003:8087"
    depends_on:
      - service-registry
      - config-server
    volumes:
      - ./logs/api-gateway:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
    restart: unless-stopped

  auth-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "9004:8081"
    depends_on:
      - service-registry
      - config-server
      - postgres
    volumes:
      - ./logs/auth-service:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
      - POSTGRES_HOST=postgres
    restart: unless-stopped

  user-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    ports:
      - "9005:8082"
    depends_on:
      - service-registry
      - config-server
      - postgres
    volumes:
      - ./logs/user-service:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
      - POSTGRES_HOST=postgres
    restart: unless-stopped

  core-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: core-service
    ports:
      - "9006:8083"
    depends_on:
      - service-registry
      - config-server
      - postgres
    volumes:
      - ./logs/core-service:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
      - POSTGRES_HOST=postgres
    restart: unless-stopped

  booking-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: booking-service
    ports:
      - "9007:8084"
    depends_on:
      - service-registry
      - config-server
      - postgres
    volumes:
      - ./logs/booking-service:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
      - POSTGRES_HOST=postgres
    restart: unless-stopped

  notification-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    ports:
      - "9008:8085"
    depends_on:
      - service-registry
      - config-server
    volumes:
      - ./logs/notification-service:/app/logs
    environment:
      - EUREKA_DEFAULT_ZONE=http://service-registry:8761/eureka/
    restart: unless-stopped

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  admin-frontend:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    ports:
      - "9009:80"
    restart: unless-stopped

  web-frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "9010:80"
    restart: unless-stopped
