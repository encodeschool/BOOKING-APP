version: "3.8"

services:

  service-registry:
    image: registry:latest
    ports:
      - "8761:8761"

  api-gateway:
    image: api-gateway:latest
    ports:
      - "8080:8080"

  auth-service:
    image: auth-service:latest
    ports:
      - "8081:8081"

  user-service:
    image: user-service:latest
    ports:
      - "8082:8082"

  core-service:
    image: core-service:latest
    ports:
      - "8083:8083"

  booking-service:
    image: booking-service:latest
    ports:
      - "8084:8084"