version: "3.9"

services:
  service-registry:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: service-registry
    ports:
      - "8761:8761"
    restart: unless-stopped

  config-server:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    ports:
      - "8888:8888"
    depends_on:
      - service-registry
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-registry
      - config-server
    restart: unless-stopped

  auth-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - service-registry
      - config-server
    restart: unless-stopped

  user-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    ports:
      - "8082:8082"
    depends_on:
      - service-registry
      - config-server
    restart: unless-stopped

  core-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: core-service
    ports:
      - "8083:8083"
    depends_on:
      - service-registry
      - config-server
    restart: unless-stopped

  booking-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: booking-service
    ports:
      - "8084:8084"
    depends_on:
      - service-registry
      - config-server
    restart: unless-stopped

  notification-service:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    ports:
      - "8085:8085"
    depends_on:
      - service-registry
      - config-server
    restart: unless-stopped

  admin-frontend:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped

  web-frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    restart: unless-stopped
