name: Deploy - Backend Services

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('services/pom.xml', 'services/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build backend services
        working-directory: services
        run: mvn clean package -DskipTests

      - name: Save SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VDS_IP }} >> ~/.ssh/known_hosts

      - name: Create JAR deployment package
        run: |
          mkdir -p backend-deploy/systemd
          mkdir -p backend-deploy/scripts

          # Copy JARs
          find services -name "*.jar" -path "*/target/*" -exec cp {} backend-deploy/ \;

          # Copy systemd files
          cp infra/systemd/booking-app-*.service backend-deploy/systemd/

          # Copy deployment scripts
          cp infra/scripts/*.sh backend-deploy/scripts/
          chmod +x backend-deploy/scripts/*.sh

          ls -la backend-deploy/

      - name: Deploy to VDS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            backend-deploy/ \
            ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }}:/tmp/backend-deploy/

      - name: Setup and start services
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }} << 'DEPLOY_EOF'
            set -e

            echo "=== Booking App Backend Deployment ==="

            # Create directories
            mkdir -p /home/encode/enroll/jars /home/encode/enroll/logs /home/encode/enroll/scripts

            # Copy systemd files
            echo "Installing systemd units..."
            sudo cp /tmp/backend-deploy/systemd/*.service /etc/systemd/system/

            # Copy scripts
            echo "Installing deployment scripts..."
            sudo cp /tmp/backend-deploy/scripts/*.sh /home/encode/enroll/scripts/
            sudo chmod +x /home/encode/enroll/scripts/*.sh

            # Backup old JARs if they exist
            if [ -n "$(ls /home/encode/enroll/jars/*.jar 2>/dev/null)" ]; then
              echo "Backing up existing JARs..."
              sudo mkdir -p /home/encode/enroll/backup/$(date +%Y%m%d_%H%M%S)
              sudo cp /home/encode/enroll/jars/*.jar /home/encode/enroll/backup/$(date +%Y%m%d_%H%M%S)/ || true
            fi

            # Copy new JARs
            echo "Deploying JAR files..."
            sudo cp /tmp/backend-deploy/*.jar /home/encode/enroll/jars/ 2>/dev/null || true

            # Set permissions to encode user
            echo "Setting permissions..."
            sudo chown -R encode:encode /home/encode/enroll

            # Reload systemd
            echo "Reloading systemd..."
            sudo systemctl daemon-reload

            # Stop old services if running
            echo "Stopping services if running..."
            sudo /home/encode/enroll/scripts/stop-backend.sh 2>/dev/null || true

            # Start services
            echo "Starting services..."
            sudo /home/encode/enroll/scripts/start-backend.sh

            echo "Deployment complete!"
          DEPLOY_EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }} << 'VERIFY_EOF'
            echo "=== Verifying Backend Services ==="

            # Check service status
            sudo /home/encode/enroll/scripts/status-backend.sh

            # Try API Gateway health
            echo ""
            echo "Testing API Gateway..."
            curl -s http://localhost:9087/actuator/health || echo "API Gateway not ready yet"

            echo ""
            echo "Deployment verification complete!"
          VERIFY_EOF


