name: Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('services/pom.xml', 'services/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build backend services
        working-directory: services
        run: mvn clean package -DskipTests

      - name: Install admin front-end dependencies
        working-directory: apps/admin
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install web front-end dependencies
        working-directory: apps/web
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Save SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to VPS using rsync
        run: |
          rsync -az --delete --exclude='.git' -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" . ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USERNAME }}/enroll
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            cd /home/${{ secrets.VPS_USERNAME }}/enroll
            docker compose -f infra/docker/docker-compose.yml down
            docker compose -f infra/docker/docker-compose.yml up -d --build
          EOF