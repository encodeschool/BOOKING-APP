name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('services/pom.xml', 'services/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Backend Services
        working-directory: services
        run: mvn clean package -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and Build Admin Frontend
        working-directory: apps/admin
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install and Build Web Frontend
        working-directory: apps/web
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Verify Generated JAR Files
        run: |
          ls -la services/config-server/target
          ls -la services/service-registry/target
          ls -la services/api-gateway/target
          ls -la services/user-service/target
          ls -la services/auth-service/target
          ls -la services/core-service/target
          ls -la services/booking-service/target
          ls -la services/notification-service/target

      - name: Verify Frontend Build Artifacts
        run: |
          ls -la apps/admin/dist
          ls -la apps/web/dist