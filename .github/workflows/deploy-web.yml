name: Deploy - Web Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "❌ ERROR: SSH_KEY secret not configured"
            exit 1
          fi
          if [ -z "${{ secrets.VDS_IP }}" ]; then
            echo "❌ ERROR: VDS_IP secret not configured"
            exit 1
          fi
          if [ -z "${{ secrets.VDS_USERNAME }}" ]; then
            echo "❌ ERROR: VDS_USERNAME secret not configured"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Build web frontend
        working-directory: apps/web
        run: npm run build

      - name: Save SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VDS_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VDS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            apps/web/dist/ \
            ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }}:/home/encode/enroll/web/

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }} << 'VERIFY_EOF'
            echo "Web frontend deployed to /home/encode/enroll/web"
            ls -la /home/encode/enroll/web/ | head -10
          VERIFY_EOF

