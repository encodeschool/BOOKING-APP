name: Deploy - Admin Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        working-directory: apps/admin
        run: npm ci --legacy-peer-deps

      - name: Build admin frontend
        working-directory: apps/admin
        run: npm run build

      - name: Save SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VDS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VDS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            apps/admin/dist/ \
            ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }}:/home/encode/enroll/admin/

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VDS_USERNAME }}@${{ secrets.VDS_IP }} << 'VERIFY_EOF'
            echo "Admin frontend deployed to /home/encode/enroll/admin"
            ls -la /home/encode/enroll/admin/ | head -10
          VERIFY_EOF

