server:
  port: 8081

jwt:
  secret: mysupersecuresecretkeythatisatleast32characterslong123

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/auth_db
    username: postgres
    password: postgres

  application:
    name: auth-service

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}