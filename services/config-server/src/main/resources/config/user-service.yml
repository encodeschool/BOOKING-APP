server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/user_db
    username: postgres
    password: postgres

  application:
    name: user-service

jwt:
  secret: mysupersecuresecretkeythatisatleast32characterslong123

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
