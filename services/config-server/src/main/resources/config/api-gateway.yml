server:
  port: 8087
  address: 0.0.0.0

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: core-service
          uri: lb://core-service
          predicates:
            - Path=/api/businesses/**,/api/services/**,/api/staff/**,/api/working-hours/**,/api/staff/working-hours/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: uploads-route
          uri: lb://core-service
          predicates:
            - Path=/uploads/**


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: mysupersecuresecretkeythatisatleast32characterslong123
