server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: core-service
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/businesses/**,/api/services/**,/api/staff/**,/api/working-hours/**

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: mysupersecuresecretkeythatisatleast32characterslong123
