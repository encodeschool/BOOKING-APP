server:
  port: 8080
  address: 0.0.0.0

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: core-service
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/businesses/**,/api/services/**,/api/staff/**,/api/working-hours/**, /api/staff/working-hours/**

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/api/bookings/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

        - id: uploads-route
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/uploads/**
            

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: mysupersecuresecretkeythatisatleast32characterslong123
