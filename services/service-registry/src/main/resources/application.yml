server:
  port: 8761

spring:
  application:
    name: service-registry

logging:
  file:
    name: logs/log.txt

eureka:
  instance:
    hostname: localhost
  client:
    registry-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/